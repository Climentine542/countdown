<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Calendar icon -->
  <rect x="140" y="160" width="232" height="220" rx="20" ry="20" fill="white" opacity="0.95"/>
  <!-- Calendar top bar -->
  <rect x="140" y="160" width="232" height="55" rx="20" ry="20" fill="white"/>
  <rect x="140" y="190" width="232" height="25" fill="#E3F2FD"/>
  <!-- Calendar binding rings -->
  <circle cx="190" cy="187" r="10" fill="#1E88E5"/>
  <circle cx="256" cy="187" r="10" fill="#1E88E5"/>
  <circle cx="322" cy="187" r="10" fill="#1E88E5"/>
  <!-- Number on calendar -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#1565C0">0</text>
  <!-- Clock hands (subtle) -->
  <line x1="256" y1="256" x2="256" y2="290" stroke="#64B5F6" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="280" y2="270" stroke="#64B5F6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="5" fill="#1E88E5"/>
</svg>
