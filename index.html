<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E88E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="倒计时">
  <meta name="description" content="简洁直观的倒计时应用">
  <title>倒计时</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== 顶部导航 ==================== -->
  <header class="app-header">
    <div class="header-left">
      <svg class="app-logo" viewBox="0 0 32 32" width="32" height="32">
        <circle cx="16" cy="16" r="14" fill="rgba(255,255,255,0.25)"/>
        <rect x="10" y="11" width="14" height="13" rx="2" fill="white"/>
        <rect x="10" y="11" width="14" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
        <text x="16" y="21" text-anchor="middle" font-size="7" font-weight="bold" fill="#1565C0">0</text>
      </svg>
      <span class="app-title">倒计时</span>
    </div>
    <div class="header-right">
      <span class="header-stat" id="headerStat">共 <strong id="totalCount">0</strong> 个事件</span>
    </div>
  </header>

  <!-- ==================== 主内容区 ==================== -->
  <main class="main-content">

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📅</div>
      <div class="empty-title">还没有事件</div>
      <div class="empty-desc">点击右下角的 <strong>+</strong> 按钮<br>添加你的第一个倒计时吧！</div>
    </div>

    <!-- 特别关心区域 -->
    <section class="section hidden" id="specialSection">
      <div class="section-header">
        <span class="section-icon">⭐</span>
        <span class="section-title">特别关心</span>
        <span class="section-count" id="specialCount">0</span>
      </div>
      <div class="event-list special-event-list" id="specialEventList">
        <!-- 动态渲染 -->
      </div>
    </section>

    <!-- 普通事件区域 -->
    <section class="section hidden" id="normalSection">
      <div class="section-header">
        <span class="section-icon">⭕</span>
        <span class="section-title">所有事件</span>
      </div>
      <div class="event-list" id="normalEventList">
        <!-- 动态渲染 -->
      </div>
    </section>

  </main>

  <!-- ==================== FAB 添加按钮 ==================== -->
  <button class="fab" id="fabAdd" title="添加事件">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ==================== 遮罩层 ==================== -->
  <div class="overlay" id="overlay"></div>

  <!-- ==================== 底部编辑面板 ==================== -->
  <div class="edit-panel" id="editPanel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <span class="panel-title" id="panelTitle">添加事件</span>
      <button class="panel-close" id="cancelBtn">✕</button>
    </div>

    <div class="panel-form">
      <!-- 活动名称 -->
      <div class="form-group">
        <label class="form-label" for="eventName">活动名称</label>
        <input type="text" class="form-input" id="eventName"
               placeholder="例如：生日、纪念日、考试…" maxlength="50" autocomplete="off">
      </div>

      <!-- 日期选择 -->
      <div class="form-group">
        <label class="form-label">日期（月/日）</label>
        <div class="date-row">
          <div class="date-input-group">
            <input type="number" class="date-input" id="eventMonth"
                   placeholder="1" min="1" max="12" inputmode="numeric">
            <span class="date-unit">月</span>
          </div>
          <span class="date-separator">—</span>
          <!-- 公历日期（数字输入） -->
          <div class="date-input-group" id="solarDayGroup">
            <input type="number" class="date-input" id="eventDay"
                   placeholder="1" min="1" max="31" inputmode="numeric">
            <span class="date-unit">日</span>
          </div>
          <!-- 农历日期（下拉选择） -->
          <div class="date-input-group hidden" id="lunarDayGroup">
            <select class="date-input lunar-day-select" id="eventDayLunar"></select>
            <span class="date-unit">日</span>
          </div>
        </div>
        <div class="day-hint" id="dayHint"></div>
      </div>

      <!-- 公历/农历切换 -->
      <div class="form-group" id="calendarToggleGroup">
        <div class="toggle-row" id="calendarToggle">
          <div class="toggle-label">
            <span class="toggle-star">📅</span>
            <span class="toggle-text">使用农历</span>
          </div>
          <div class="toggle-indicator"></div>
        </div>
        <div class="toggle-lock-hint hidden" id="calendarLockHint">创建后不可更改</div>
      </div>

      <!-- 特别关心开关 -->
      <div class="form-group">
        <div class="toggle-row" id="specialToggle">
          <div class="toggle-label">
            <span class="toggle-star">⭐</span>
            <span class="toggle-text">特别关心</span>
          </div>
          <div class="toggle-indicator"></div>
        </div>
      </div>

      <!-- 通知范围（仅在特别关心时显示） -->
      <div class="form-group notify-range-group hidden" id="notifyRangeGroup">
        <label class="form-label" for="notifyRange">通知范围</label>
        <div class="notify-range-row">
          <span class="date-unit">活动前</span>
          <input type="number" class="notify-range-input" id="notifyRange"
                 value="30" min="1" max="365" inputmode="numeric">
          <span class="notify-range-unit">天开始通知</span>
        </div>
        <div class="notify-hint">到计时个位为 0 时通知（…30天、20天、10天、当天）</div>
      </div>

      <!-- 操作按钮 -->
      <div class="form-actions">
        <button class="btn btn-primary" id="saveBtn">保存</button>
        <button class="btn btn-secondary" id="cancelBtn2">取消</button>
        <button class="btn btn-danger hidden" id="deleteBtn">删除</button>
      </div>
    </div>
  </div>

  <!-- ==================== Toast ==================== -->
  <div class="toast" id="toast"></div>

  <!-- ==================== JS ==================== -->
  <script src="js/lunar.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
